version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wallet_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: wallet_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:secretpassword@postgres:5432/wallet_db?sslmode=disable
      - REDIS_ADDR=redis:6379
      - GIN_MODE=release
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: